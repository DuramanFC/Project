<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tabla Actual - Duraman FC</title>
    <link rel="icon" href="img/dm logo.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="club-header">
        <h1 class="club-title">Duraman FC</h1>
        <p class="club-subtitle">TABLA DE POSICIONES | TEMPORADA 26</p>
    </header>

    <main class="tabla-contenedor">
        <div class="tabla-scroll">
            <table id="tabla-posiciones">
                <thead>
                    <tr>
                        <th>Posición</th>
                        <th>Jugador</th>
                        <th>Partidos</th>
                        <th>Goles</th>
                        <th>Asist.</th>
                        <th>G/P</th>
                        <th>A/P</th>
                        <th>G + A</th>
                        <th>Puntaje</th>
                        <th>Título</th>
                        <th>MVP</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-tabla">
                </tbody>
            </table>
        </div>
        
        <div class="acciones-tabla">
            <a href="index.html" class="btn-volver">← Volver al Panel</a>
        </div>
    </main>

    <footer class="club-footer">
        <p>© 2026 Duraman FC. Todos los derechos reservados.</p>
    </footer>

    <script>
        const jugadores = [
            { nombre: "Aslan", partidos: 55, goles: 58, asistencias: 29, mvp: 14 },
            { nombre: "Dawins", partidos: 49, goles: 39, asistencias: 32, mvp: 16 },
            { nombre: "Wenderly", partidos: 44, goles: 42, asistencias: 18, mvp: 6 },
            { nombre: "Eliant", partidos: 38, goles: 31, asistencias: 17, mvp: 4 },
            { nombre: "Sebastián", partidos: 54, goles: 30, asistencias: 11, mvp: 15 },
            { nombre: "Jeremy", partidos: 46, goles: 25, asistencias: 14, mvp: 3 },
            { nombre: "Daniel", partidos: 40, goles: 17, asistencias: 18, mvp: 6 },
            { nombre: "Joelfry", partidos: 42, goles: 18, asistencias: 10, mvp: 7 },
            { nombre: "Nicolás", partidos: 51, goles: 11, asistencias: 15, mvp: 5 },
            { nombre: "Adonys", partidos: 34, goles: 11, asistencias: 6, mvp: 3 },
            { nombre: "Dylan", partidos: 17, goles: 8, asistencias: 8, mvp: 1 },
            { nombre: "Gari", partidos: 15, goles: 4, asistencias: 10, mvp: 3 },
            { nombre: "Welfry", partidos: 13, goles: 9, asistencias: 2, mvp: 1 },
            { nombre: "Geraldo", partidos: 46, goles: 2, asistencias: 8, mvp: 5 },
            { nombre: "Christian", partidos: 11, goles: 0, asistencias: 8, mvp: 1 },
            { nombre: "Oscar", partidos: 30, goles: 4, asistencias: 1, mvp: 7 },
            { nombre: "Leo", partidos: 37, goles: 3, asistencias: 1, mvp: 3 },
            { nombre: "Obed", partidos: 11, goles: 2, asistencias: 2, mvp: 3 },
            { nombre: "Lecnar", partidos: 42, goles: 0, asistencias: 0, mvp: 2 }
        ];

        let maxGoles = 0;
        let maxAsistencias = 0;
        let maxGMasA = 0;
        let maxMvp = 0;

        jugadores.forEach(j => {
            j.gp = j.partidos > 0 ? (j.goles / j.partidos).toFixed(2) : "0.00";
            j.ap = j.partidos > 0 ? (j.asistencias / j.partidos).toFixed(2) : "0.00";
            j.gMasA = j.goles + j.asistencias;
            j.puntaje = (j.goles * 3) + (j.asistencias * 2);

            if (j.goles > maxGoles) maxGoles = j.goles;
            if (j.asistencias > maxAsistencias) maxAsistencias = j.asistencias;
            if (j.gMasA > maxGMasA) maxGMasA = j.gMasA;
            if (j.mvp > maxMvp) maxMvp = j.mvp;
        });

        jugadores.forEach(j => {
            let titulosArray = [];
            
            if (j.goles === maxGoles && maxGoles > 0) titulosArray.push("⚽");
            if (j.asistencias === maxAsistencias && maxAsistencias > 0) titulosArray.push("🦵");
            if (j.gMasA === maxGMasA && maxGMasA > 0) titulosArray.push("⚔️");
            if (j.mvp === maxMvp && maxMvp > 0) titulosArray.push("⭐");

            j.titulo = titulosArray.join(" ");
        });

        jugadores.sort((a, b) => b.puntaje - a.puntaje);

        const cuerpoTabla = document.getElementById("cuerpo-tabla");
        
        jugadores.forEach((j, index) => {
            const fila = document.createElement("tr");
            let claseFila = "";
            if (index === 0) claseFila = "primer-lugar";
            
            fila.innerHTML = `
                <td class="${claseFila}"><strong>${index + 1}</strong></td>
                <td><strong>${j.nombre}</strong></td>
                <td>${j.partidos}</td>
                <td>${j.goles}</td>
                <td>${j.asistencias}</td>
                <td class="calculado">${j.gp}</td>
                <td class="calculado">${j.ap}</td>
                <td class="calculado font-bold">${j.gMasA}</td>
                <td class="destacado">${j.puntaje}</td>
                <td class="titulos-emojis" title="Logros de Temporada">${j.titulo || "-"}</td>
                <td>${j.mvp}</td>
            `;
            cuerpoTabla.appendChild(fila);
        });
    </script>
</body>
</html>
