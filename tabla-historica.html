<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tabla Historica - Duraman FC</title>
    <link rel="icon" href="img/dm logo.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="club-header">
        <h1 class="club-title">Duraman FC</h1>
        <p class="club-subtitle">TABLA DE POSICIONES | Historica</p>
    </header>

    <main class="tabla-contenedor">
        <div class="tabla-scroll">
            <table id="tabla-posiciones">
                <thead>
                    <tr>
                        <th>Posición</th>
                        <th>Jugador</th>
                        <th>Partidos</th>
                        <th>Goles</th>
                        <th>Asist.</th>
                        <th>G/P</th>
                        <th>A/P</th>
                        <th>G + A</th>
                        <th>Puntaje</th>
                        <th>Título</th>
                        <th>MVP</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-tabla">
                </tbody>
            </table>
        </div>
        
        <div class="acciones-tabla">
            <a href="index.html" class="btn-volver">← Volver al Panel</a>
        </div>
    </main>

    <footer class="club-footer">
        <p>© 2026 Duraman FC. Todos los derechos reservados.</p>
    </footer>

    <script>
        const jugadores = [
            { nombre: "Aslan", partidos: 185, goles: 235, asistencias: 122, mvp: 14, posicion: "DC/EI/MCO", nacionalidad: "Venezolano 🇻🇪", edad: 19 },
            { nombre: "Dawins", partidos: 179, goles: 200, asistencias: 117, mvp: 16, posicion: "Medio", nacionalidad: "Dominicano 🇩🇴", edad: 22 },
            { nombre: "Wenderly", partidos: 135, goles: 182, asistencias: 56, mvp: 6, posicion: "DC/EI/ED", nacionalidad: "Haitiano 🇭🇹", edad: 19 },
            { nombre: "Sebastián", partidos: 170, goles: 104, asistencias: 48, mvp: 15, posicion: "DFC/DC", nacionalidad: "Venezolano 🇻🇪", edad: 21 },
            { nombre: "Eliant", partidos: 98, goles: 81, asistencias: 63, mvp: 4, posicion: "ED/EI", nacionalidad: "Dominicano 🇩🇴", edad: 21 },
            { nombre: "Josue", partidos: 41, goles: 71, asistencias: 27, mvp: 0, posicion: "DC", nacionalidad: "Venezolano 🇻🇪", edad: 19 },
            { nombre: "Christian", partidos: 79, goles: 12, asistencias: 76, mvp: 1, posicion: "MC/DFC", nacionalidad: "Dominicano 🇩🇴", edad: 19 },
            { nombre: "Daniel", partidos: 40, goles: 17, asistencias: 18, mvp: 6, posicion: "DFC/MCD/MC", nacionalidad: "Dominicano 🇩🇴", edad: 17 },
            { nombre: "Miguel", partidos: 86, goles: 28, asistencias: 11, mvp: 0, posicion: "LD/MC/MCO", nacionalidad: "Dominicano 🇩🇴", edad: 19 },
            { nombre: "Jeremy", partidos: 46, goles: 25, asistencias: 14, mvp: 3, posicion: "EI/ED", nacionalidad: "Dominicano 🇩🇴", edad: 17 },
            { nombre: "Joelfry", partidos: 66, goles: 24, asistencias: 19, mvp: 7, posicion: "MCD/MC", nacionalidad: "Dominicano 🇩🇴", edad: 19 },
            { nombre: "Gari", partidos: 45, goles: 11, asistencias: 24, mvp: 3, posicion: "DFC/MC", nacionalidad: "Dominicano 🇩🇴", edad: 19 },
            { nombre: "Adonys", partidos: 36, goles: 20, asistencias: 6, mvp: 3, posicion: "PO/DFC/DC", nacionalidad: "Dominicano 🇩🇴", edad: 20 },
            { nombre: "Leo", partidos: 105, goles: 9, asistencias: 22, mvp: 3, posicion: "DFC/MCD/PO", nacionalidad: "Dominicano 🇩🇴", edad: 20 },
            { nombre: "Nicolás", partidos: 51, goles: 11, asistencias: 15, mvp: 5, posicion: "DFC/MC", nacionalidad: "Dominicano 🇩🇴", edad: 14 },
            { nombre: "Keurys", partidos: 28, goles: 13, asistencias: 8, mvp: 0, posicion: "EI", nacionalidad: "Dominicano 🇩🇴", edad: 16 },
            { nombre: "Geraldo", partidos: 66, goles: 6, asistencias: 18, mvp: 5, posicion: "DFC", nacionalidad: "Dominicano 🇩🇴", edad: 18 },
            { nombre: "Dylan", partidos: 17, goles: 8, asistencias: 8, mvp: 1, posicion: "MCO/ED", nacionalidad: "Dominicano 🇩🇴", edad: 14 },
            { nombre: "Alberto", partidos: 34, goles: 10, asistencias: 5, mvp: 0, posicion: "DFC/PO", nacionalidad: "Dominicano 🇩🇴", edad: 19 },
            { nombre: "Welfry", partidos: 13, goles: 9, asistencias: 2, mvp: 1, posicion: "MCO", nacionalidad: "Dominicano 🇩🇴", edad: 16 },
            { nombre: "Oscar", partidos: 49, goles: 6, asistencias: 5, mvp: 7, posicion: "DFC/MC/PO", nacionalidad: "Dominicano 🇩🇴", edad: 20 },
            { nombre: "Obed", partidos: 16, goles: 2, asistencias: 7, mvp: 3, posicion: "PO/MC", nacionalidad: "Dominicano 🇩🇴", edad: 18 },
            { nombre: "Argenis", partidos: 4, goles: 2, asistencias: 4, mvp: 0, posicion: "MC", nacionalidad: "Dominicano 🇩🇴", edad: 20 },
            { nombre: "Jacob", partidos: 4, goles: 2, asistencias: 2, mvp: 0, posicion: "DC", nacionalidad: "Dominicano 🇩🇴", edad: 13 },
            { nombre: "Erick", partidos: 3, goles: 2, asistencias: 0, mvp: 0, posicion: "DFC", nacionalidad: "Dominicano 🇩🇴", edad: 18 },
            { nombre: "Lecnar", partidos: 42, goles: 0, asistencias: 0, mvp: 2, posicion: "DFC/PO", nacionalidad: "Dominicano 🇩🇴", edad: 17 }
        ];

        let maxGoles = 0;
        let maxAsistencias = 0;
        let maxGMasA = 0;
        let maxMvp = 0;

        jugadores.forEach(j => {
            j.gp = j.partidos > 0 ? (j.goles / j.partidos).toFixed(2) : "0.00";
            j.ap = j.partidos > 0 ? (j.asistencias / j.partidos).toFixed(2) : "0.00";
            j.gMasA = j.goles + j.asistencias;
            j.puntaje = (j.goles * 3) + (j.asistencias * 2);

            if (j.goles > maxGoles) maxGoles = j.goles;
            if (j.asistencias > maxAsistencias) maxAsistencias = j.asistencias;
            if (j.gMasA > maxGMasA) maxGMasA = j.gMasA;
            if (j.mvp > maxMvp) maxMvp = j.mvp;
        });

        jugadores.forEach(j => {
            let titulosArray = [];
            
            if (j.goles === maxGoles && maxGoles > 0) titulosArray.push("⚽");
            if (j.asistencias === maxAsistencias && maxAsistencias > 0) titulosArray.push("🦵");
            if (j.gMasA === maxGMasA && maxGMasA > 0) titulosArray.push("⚔️");
            if (j.mvp === maxMvp && maxMvp > 0) titulosArray.push("⭐");

            j.titulo = titulosArray.join(" ");
        });

        jugadores.sort((a, b) => b.puntaje - a.puntaje);

        const cuerpoTabla = document.getElementById("cuerpo-tabla");
        
        jugadores.forEach((j, index) => {
            const fila = document.createElement("tr");
            let claseFila = "";
            if (index === 0) claseFila = "primer-lugar";
            
            const urlParams = `user=${encodeURIComponent(j.nombre)}&pj=${j.partidos}&g=${j.goles}&a=${j.asistencias}&mvp=${j.mvp}&t=${encodeURIComponent(j.titulo || "-")}&pos=${encodeURIComponent(j.posicion)}&nac=${encodeURIComponent(j.nacionalidad)}&edad=${j.edad}`;
            
            fila.innerHTML = `
                <td class="${claseFila}"><strong>${index + 1}</strong></td>
                <td>
                    <a href="perfil-historico.html?${urlParams}" class="enlace-jugador">
                        ${j.nombre}
                    </a>
                </td>
                <td>${j.partidos}</td>
                <td>${j.goles}</td>
                <td>${j.asistencias}</td>
                <td class="calculado">${j.gp}</td>
                <td class="calculado">${j.ap}</td>
                <td class="calculado font-bold">${j.gMasA}</td>
                <td class="destacado">${j.puntaje}</td>
                <td class="titulos-emojis" title="Logros de Temporada">${j.titulo || "-"}</td>
                <td>${j.mvp}</td>
            `;
            cuerpoTabla.appendChild(fila);
        });
    </script>
</body>
</html>
